# deploy/nginx.conf — Nginx конфиг PreLend (reference copy)
# Автоматически применяется deploy.sh, здесь для документации.
#
# PHP-FPM: пул [prelend] слушает unix:/run/php/php8.3-fpm-prelend.sock (не php8.3-fpm.sock у pool www).
# Пошаговое выравнивание на старом VPS: deploy/UPGRADE_AFTER_GIT_PULL.md
#
# Особенности:
#   - Cloudflare proxy: реальный IP через CF-Connecting-IP
#   - Блокировка прямого доступа к служебным директориям
#   - Rate limit для /postback.php (30 rps)
#   - Минимальные заголовки безопасности

# В /etc/nginx/nginx.conf добавить в блок http {}:
#   limit_req_zone $binary_remote_addr zone=postback:10m rate=30r/s;
#   real_ip_header CF-Connecting-IP;
#   set_real_ip_from 103.21.244.0/22;
#   set_real_ip_from 103.22.200.0/22;
#   set_real_ip_from 103.31.4.0/22;
#   set_real_ip_from 141.101.64.0/18;
#   set_real_ip_from 108.162.192.0/18;
#   set_real_ip_from 190.93.240.0/20;
#   set_real_ip_from 188.114.96.0/20;
#   set_real_ip_from 197.234.240.0/22;
#   set_real_ip_from 198.41.128.0/17;
#   set_real_ip_from 162.158.0.0/15;
#   set_real_ip_from 104.16.0.0/13;
#   set_real_ip_from 104.24.0.0/14;
#   set_real_ip_from 172.64.0.0/13;
#   set_real_ip_from 131.0.72.0/22;
#   real_ip_recursive on;

server {
    listen 80;
    server_name yourdomain.me www.yourdomain.me;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourdomain.me www.yourdomain.me;

    ssl_certificate     /etc/letsencrypt/live/yourdomain.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.me/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root  /var/www/prelend/public;
    index index.php;

    access_log /var/log/nginx/prelend_access.log;
    error_log  /var/log/nginx/prelend_error.log warn;

    server_tokens off;

    # Заголовки безопасности
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy       "no-referrer"  always;

    # Блокируем прямой доступ к служебным директориям
    location ~ ^/(config|data|src|monitor|agents|templates|deploy|logs|tests)/ {
        deny all;
        return 404;
    }

    # .env и .git точно закрыты
    location ~ /\.(env|git) {
        deny all;
        return 404;
    }

    # Internal API (FastAPI, порт 9090) — доступен ТОЛЬКО через SSH tunnel
    # Прямой доступ из интернета заблокирован
    location /internal_api {
        deny all;
        return 404;
    }

    # Постбэк с rate limit
    location = /postback.php {
        limit_req zone=postback burst=30 nodelay;
        fastcgi_pass  unix:/run/php/php8.3-fpm-prelend.sock;
        fastcgi_index index.php;
        include       fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 90s;
    }


    # ── Bio-ссылки: короткие пути с автоматическими UTM ──────────────────
    # /t/acc01  → TikTok bio    → utm_source=tiktok&utm_medium=bio&utm_campaign=acc01
    # /i/acc01  → Instagram bio → utm_source=instagram&utm_medium=bio&utm_campaign=acc01
    # /y/acc01  → YouTube About → utm_source=youtube&utm_medium=bio&utm_campaign=acc01
    # /go/tag   → универсальный → utm_source=bio&utm_campaign=tag
    # Пользовательские параметры (?utm_term=...) пробрасываются через $args.

    location ~ ^/t/(?<acc>[a-zA-Z0-9_-]+)$ {
        rewrite ^ /index.php?utm_source=tiktok&utm_medium=bio&utm_campaign=$acc&$args last;
    }

    location ~ ^/i/(?<acc>[a-zA-Z0-9_-]+)$ {
        rewrite ^ /index.php?utm_source=instagram&utm_medium=bio&utm_campaign=$acc&$args last;
    }

    location ~ ^/y/(?<acc>[a-zA-Z0-9_-]+)$ {
        rewrite ^ /index.php?utm_source=youtube&utm_medium=bio&utm_campaign=$acc&$args last;
    }

    location ~ ^/go/(?<tag>[a-zA-Z0-9_-]+)$ {
        rewrite ^ /index.php?utm_source=bio&utm_campaign=$tag&$args last;
    }

    # PHP файлы
    location ~ \.php$ {
        fastcgi_pass  unix:/run/php/php8.3-fpm-prelend.sock;
        fastcgi_index index.php;
        include       fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 90s;
    }

    # Статика (если будет)
    location ~* \.(css|js|png|jpg|ico|woff2?)$ {
        expires 30d;
        access_log off;
    }

    # Всё остальное → index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
}
